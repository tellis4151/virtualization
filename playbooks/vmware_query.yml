---
- name: Deploy VM from Folder Template
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get IP from vCenter
      vmware.vmware_rest.vcenter_vm_info:
        vcenter_validate_certs: false
        names: "vm-test-demo"
      register: vm_info

    - name: Display VM information
      debug:
        var: vm_info