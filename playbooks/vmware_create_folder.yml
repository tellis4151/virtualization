---
- name: Deploy VM from Folder Template
  hosts: localhost
  gather_facts: false

  tasks:
  - name: Create A VMWare Folder
    vmware.vmware.folder:
      validate_certs: false
      datacenter: "SDDC-Datacenter"
      folder_type: vm
      relative_path: Workloads/sandbox-j7ttn/Templates
      state: present